<html>
    <head>
        <link rel="stylesheet" href="index.css">
    </head>
    <body>
        <div class="board">
            <div class="column">
                <h3 class="header">HOME</h3>
                <h2 class="score" id="score-home">0</h2>
                <div class="btn">
                    <button onclick="homePlusOne()">+1</button>
                    <button onclick="homePlusTwo()">+2</button>
                    <button onclick="homePlusThree()">+3</button>
                </div>
            </div>
            <div class="column">
                <h3 class="header">AWAY</h3>
                <h2 class="score" id="score-guest">0</h2>
                <div class="btn">
                    <button onclick="guestPlusOne()">+1</button>
                    <button onclick="guestPlusTwo()">+2</button>
                    <button onclick="guestPlusThree()">+3</button>
                </div>
            </div>
        </div>
        <script src="index.js"></script>
    </body>
</html>
