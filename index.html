<html>
    <head>
        <link rel="stylesheet" href="index.css">
    </head>
    <body>
        <div class="board">
            <div class="column">
                <h3 class="header">HOME</h3>
                <h2 class="score" id="score-home">0</h2>
                <div class="btn">
                    <button onclick="homePlus1()">+1</button>
                    <button onclick="homePlus2()">+2</button>
                    <button onclick="homePlus3()">+3</button>
                </div>
            </div>
            <div class="column">
                <h3 class="header">GUEST</h3>
                <h2 class="score" id="score-guest">0</h2>
                <div class="btn">
                    <button onclick="guestPlus1()">+1</button>
                    <button onclick="guestPlus2()">+2</button>
                    <button onclick="guestPlus3()">+3</button>
                </div>
            </div>
        </div>
        <script src="index.js"></script>
    </body>
</html>
